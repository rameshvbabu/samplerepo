name: Cleanup Old Branches

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true = do not delete)"
        required: true
        default: "true"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cleanup branches
        env:
          EXCEPTIONS: "main develop dev qa prod staging production"
          DAYS: 50
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
        run: |

          echo "Dry run mode: $DRY_RUN"

          git fetch --prune

          cutoff=$(date -d "$DAYS days ago" +%s)

          for branch in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/); do

            branch_name=${branch#origin/}

            # skip HEAD
            if [[ "$branch_name" == "HEAD" ]]; then
              continue
            fi

            # skip exceptions
            if [[ " $EXCEPTIONS " =~ " $branch_name " ]]; then
              echo "Skipping protected branch: $branch_name"
              continue
            fi

            last_commit=$(git log -1 --format=%ct origin/$branch_name)

            if [[ $last_commit -lt $cutoff ]]; then

              if [[ "$DRY_RUN" == "true" ]]; then
                echo "[DRY RUN] Would delete branch: $branch_name"
              else
                echo "Deleting branch: $branch_name"
                git push origin --delete $branch_name
              fi

            fi
          done
