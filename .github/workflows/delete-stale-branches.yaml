name: Cleanup Old Branches

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true = no deletion)"
        required: true
        default: "true"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cleanup branches
        env:
          EXCEPTIONS: "qa dev main qa_02"
          DAYS: 30
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
        run: |

          git fetch --all --prune

          cutoff=$(date -d "$DAYS days ago" +%s)

          git branch -r | grep -v '\->' | while read remote; do

            branch=${remote#origin/}
            branch=$(echo $branch | xargs)

            # Skip protected branches
            if [[ " $EXCEPTIONS " =~ " $branch " ]]; then
              echo "Skipping protected branch: $branch"
              continue
            fi

            last_commit=$(git log -1 --format=%ct $remote)

            if [[ $last_commit -lt $cutoff ]]; then

              if [[ "$DRY_RUN" == "true" ]]; then
                echo "[DRY RUN] Would delete branch: $branch"
              else
                echo "Deleting branch: $branch"
                git push origin --delete $branch
              fi

            fi

          done
